[main]
# The default PPD profile. Overridden from upstream `balanced` to
# `performance` so that on first boot of the installed system,
# tuned-ppd writes its mapped tuned profile (`throughput-performance`)
# into /etc/tuned/active_profile — preserving the airootfs intent.
#
# Without this override, the airootfs-seeded active_profile is
# silently clobbered to `balanced` when tuned-ppd.service starts
# for the first time.
default=performance
battery_detection=true
sysfs_acpi_monitor=true

[profiles]
# PPD = TuneD
power-saver=powersave
balanced=balanced
performance=throughput-performance

[battery]
# PPD = TuneD
balanced=balanced-battery
