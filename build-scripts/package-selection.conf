# package-selection.conf — TIER 3 packages to EXCLUDE from the ISO.
#
# Written by the kiro-iso-builder GUI's Packages screen (the packages you TICK
# there are the ones removed); build-the-iso.sh's apply_package_selection()
# comments each one out in the build-tree copy of packages.x86_64. One package
# name per line. Lines starting with # are ignored. An empty list (this
# default) ships the full TIER 3 set.
#
# Only TIER 3 (USER-CHANGEABLE / OPTIONAL) packages belong here — TIER 1
# (frozen) and TIER 2 (core) must never be excluded.
